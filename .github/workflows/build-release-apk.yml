name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Pozwala na ręczne wywołanie builda z panelu GitHub

permissions:
  contents: write # Wymagane, aby móc załączyć pliki APK do GitHub Release

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Stabilna dystrybucja OpenJDK
          java-version: '21'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Uruchamiamy kompilację wersji debugowej (automatycznie podpisana kluczem debugowym, gotowa do instalacji)
      # oraz wersji release (unsigned, wymagająca własnego podpisu)
      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      # Zmiana nazw plików APK na czytelne dla użytkowników (np. ArbiCore-v1.0.1.apk)
      - name: Prepare Artifacts
        run: |
          mkdir -p build/outputs/release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk build/outputs/release-artifacts/ArbiCore-Mobile-Debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk build/outputs/release-artifacts/ArbiCore-Mobile-Release-Unsigned.apk

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-apks
          path: build/outputs/release-artifacts/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Uruchamia się tylko przy wypchnięciu tagu wersji

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: compiled-apks
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/ArbiCore-Mobile-Debug.apk
            release-artifacts/ArbiCore-Mobile-Release-Unsigned.apk
          draft: false
          prerelease: false
          generate_release_notes: true # Automatycznie wygeneruje listę zmian na podstawie commitów
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
